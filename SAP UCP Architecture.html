  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

paper); color: var(--ink); font-family: 'Geist', ui-sans-serif, system-ui, sans-serif; }\n  body {\n    background-image:\n      radial-gradient(circle at 1px 1px, rgba(11,15,20,0.09) 1px, transparent 0);\n    background-size: 22px 22px;\n  }\n  .page {\n    max-width: 1480px;\n    margin: 0 auto;\n    padding: 56px 56px 88px;\n  }\n\n  /* Header */\n  .masthead {\n    display: grid;\n    grid-template-columns: 1fr auto;\n    align-items: end;\n    gap: 32px;\n    border-bottom: 2px solid var(--ink);\n    padding-bottom: 18px;\n    margin-bottom: 36px;\n  }\n  .eyebrow {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--muted);\n    margin-bottom: 10px;\n  }\n  h1 {\n    font-family: 'Instrument Serif', serif;\n    font-weight: 400;\n    font-size: 56px;\n    line-height: 1.02;\n    letter-spacing: -0.01em;\n    margin: 0;\n  }\n  h1 em { font-style: italic; color: var(--accent); }\n  .meta {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    color: var(--muted);\n    text-align: right;\n    line-height: 1.7;\n  }\n  .meta b { color: var(--ink); font-weight: 600; }\n\n  /* Legend */\n  .legend {\n    display: flex;\n    flex-wrap: wrap;\n    gap: 20px 28px;\n    padding: 14px 18px;\n    border: 1px solid var(--ink);\n    background: var(--paper-2);\n    margin-bottom: 28px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n  }\n  .legend .item { display: flex; align-items: center; gap: 8px; }\n  .swatch { width: 14px; height: 14px; border: 1px solid var(--ink); display: inline-block; }\n\n  /* Diagram grid */\n  .diagram {\n    display: grid;\n    grid-template-columns: 200px 1fr;\n    gap: 0;\n    border: 2px solid var(--ink);\n    background: #fff;\n    position: relative;\n  }\n  .tier-label {\n    writing-mode: vertical-rl;\n    transform: rotate(180deg);\n    text-align: center;\n    padding: 24px 8px;\n    border-right: 1px solid var(--ink);\n    border-bottom: 1px solid var(--ink);\n    background: var(--paper-2);\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--muted);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n  }\n  .tier-label .num {\n    font-family: 'Instrument Serif', serif;\n    font-size: 42px;\n    letter-spacing: 0;\n    text-transform: none;\n    color: var(--ink);\n    writing-mode: horizontal-tb;\n    transform: rotate(0deg);\n    margin-bottom: 10px;\n    display: block;\n  }\n  .tier-label-inner { display: flex; flex-direction: column; align-items: center; }\n\n  .tier {\n    padding: 28px 32px;\n    border-bottom: 1px solid var(--ink);\n    position: relative;\n  }\n  .tier:last-of-type, .tier-label:last-of-type { border-bottom: none; }\n  .tier-title {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--muted);\n    margin-bottom: 14px;\n  }\n  .tier-title strong { color: var(--ink); font-weight: 600; }\n\n  /* Cards */\n  .row { display: flex; gap: 18px; flex-wrap: wrap; }\n  .card {\n    border: 1.5px solid var(--ink);\n    background: #fff;\n    padding: 14px 16px;\n    min-width: 220px;\n    flex: 1 1 220px;\n    position: relative;\n  }\n  .card .chip {\n    position: absolute;\n    top: -9px;\n    left: 12px;\n    background: #fff;\n    padding: 0 6px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: var(--muted);\n  }\n  .card h3 {\n    margin: 4px 0 6px;\n    font-size: 15px;\n    font-weight: 600;\n    letter-spacing: -0.005em;\n    display: flex;\n    align-items: center;\n    gap: 8px;\n  }\n  .card .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }\n  .card p {\n    margin: 0;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10.5px;\n    line-height: 1.55;\n    color: var(--muted);\n  }\n  .card ul {\n    margin: 6px 0 0;\n    padding-left: 0;\n    list-style: none;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10.5px;\n    line-height: 1.7;\n  }\n  .card ul li { padding-left: 12px; position: relative; }\n  .card ul li::before {\n    content: \"›\";\n    position: absolute;\n    left: 0;\n    color: var(--muted);\n  }\n  .card.ai { border-color: var(--ai); }\n  .card.ai .dot { background: var(--ai); }\n  .card.ucp { border-color: var(--ucp); }\n  .card.ucp .dot { background: var(--ucp); }\n  .card.agent { border-color: var(--agent); }\n  .card.agent .dot { background: var(--agent); }\n  .card.sap { border-color: var(--accent); }\n  .card.sap .dot { background: var(--accent); }\n\n  .card .endpoint {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    background: var(--paper-2);\n    border: 1px solid rgba(11,15,20,0.18);\n    padding: 3px 6px;\n    display: inline-block;\n    margin-right: 4px;\n    margin-top: 4px;\n  }\n  .endpoint .verb { color: var(--ucp); font-weight: 600; }\n  .endpoint .verb.post { color: var(--accent); }\n\n  /* Flow arrow block */\n  .arrow-col { display: flex; align-items: center; justify-content: center; flex: 0 0 56px; }\n  .arrow-col .arrow {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 22px;\n    color: var(--muted);\n  }\n\n  /* Tier 1 special layout: user + agent + gemini */\n  .agent-row {\n    display: grid;\n    grid-template-columns: 1fr 40px 1fr 40px 1fr;\n    align-items: stretch;\n    gap: 0;\n  }\n  .agent-row .card { flex: 1 1 auto; min-width: 0; }\n\n  /* Tier 2 (UCP) horizontal flex with endpoints */\n  .ucp-bar {\n    display: flex;\n    gap: 0;\n    border: 1.5px solid var(--ucp);\n    background: #fff;\n    overflow: hidden;\n  }\n  .ucp-cell {\n    flex: 1;\n    padding: 14px 16px;\n    border-right: 1px solid rgba(11,143,94,0.3);\n    min-width: 0;\n  }\n  .ucp-cell:last-child { border-right: none; }\n  .ucp-cell h4 {\n    margin: 0 0 8px;\n    font-size: 13px;\n    font-weight: 600;\n  }\n  .ucp-cell .route {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    color: var(--ucp);\n    display: block;\n    line-height: 1.6;\n  }\n  .ucp-cell .route .method {\n    display: inline-block;\n    width: 34px;\n    color: var(--muted);\n    font-weight: 600;\n  }\n  .ucp-cell .desc {\n    margin-top: 8px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    color: var(--muted);\n    line-height: 1.5;\n  }\n\n  /* Vertical connector lines between tiers */\n  .connector {\n    height: 36px;\n    border-left: 1px dashed var(--ink);\n    border-right: 1px dashed var(--ink);\n    margin: 0 auto;\n    width: 80%;\n    position: relative;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    pointer-events: none;\n  }\n  .connector .badge {\n    background: var(--paper);\n    border: 1px solid var(--ink);\n    padding: 3px 10px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n  }\n\n  /* Flow timeline */\n  .flow {\n    margin-top: 40px;\n    border: 2px solid var(--ink);\n    background: #fff;\n  }\n  .flow-head {\n    padding: 18px 24px;\n    border-bottom: 1px solid var(--ink);\n    background: var(--paper-2);\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n  }\n  .flow-head h2 {\n    margin: 0;\n    font-family: 'Instrument Serif', serif;\n    font-weight: 400;\n    font-size: 28px;\n  }\n  .flow-head .sub {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    color: var(--muted);\n  }\n  .steps {\n    display: grid;\n    grid-template-columns: repeat(6, 1fr);\n    gap: 0;\n  }\n  .step {\n    padding: 22px 20px;\n    border-right: 1px solid rgba(11,15,20,0.15);\n    position: relative;\n  }\n  .step:last-child { border-right: none; }\n  .step .n {\n    font-family: 'Instrument Serif', serif;\n    font-size: 34px;\n    line-height: 1;\n    color: var(--accent);\n    display: block;\n    margin-bottom: 6px;\n  }\n  .step h4 {\n    margin: 0 0 6px;\n    font-size: 13px;\n    font-weight: 600;\n  }\n  .step p {\n    margin: 0;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    line-height: 1.55;\n    color: var(--muted);\n  }\n  .step .arr {\n    position: absolute;\n    right: -8px;\n    top: 50%;\n    transform: translateY(-50%);\n    background: var(--paper);\n    border: 1px solid var(--ink);\n    width: 16px;\n    height: 16px;\n    border-radius: 50%;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    z-index: 2;\n  }\n  .step:last-child .arr { display: none; }\n\n  /* Footer */\n  .footnote {\n    margin-top: 32px;\n    display: grid;\n    grid-template-columns: 1fr 1fr 1fr;\n    gap: 18px;\n  }\n  .note {\n    border-left: 2px solid var(--ink);\n    padding: 6px 0 6px 14px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10.5px;\n    line-height: 1.6;\n    color: var(--muted);\n  }\n  .note b { color: var(--ink); font-weight: 600; }\n\n  /* subtle */\n  .tech-line {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    color: var(--muted);\n    margin-top: 8px;\n  }\n  .tech-line span {\n    border: 1px solid rgba(11,15,20,0.2);\n    padding: 2px 6px;\n    margin-right: 4px;\n    background: var(--paper-2);\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"page\">\n\n  <header class=\"masthead\">\n    <div>\n      <div class=\"eyebrow\">SAP Commerce Cloud × Universal Commerce Protocol · Proof of Concept<\u002Fdiv>\n      <h1>System <em>architecture<\u002Fem> — agentic commerce over a UCP facade.<\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"meta\">\n      <b>sap-ucp-poc<\u002Fb> · v0.0.1-SNAPSHOT<br>\n      Java 17 · Spring Boot 3.2.5<br>\n      Merchant · <b>nestle-store<\u002Fb><br>\n      UCP spec · 2026-01-11\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div class=\"legend\">\n    <div class=\"item\"><span class=\"swatch\" style=\"background:#7a42c7\"><\u002Fspan> AI Agent (external)<\u002Fdiv>\n    <div class=\"item\"><span class=\"swatch\" style=\"background:#1e5fd6\"><\u002Fspan> AI orchestration (Gemini)<\u002Fdiv>\n    <div class=\"item\"><span class=\"swatch\" style=\"background:#0b8f5e\"><\u002Fspan> UCP facade (standard)<\u002Fdiv>\n    <div class=\"item\"><span class=\"swatch\" style=\"background:#d64b2a\"><\u002Fspan> SAP Commerce Cloud (mocked)<\u002Fdiv>\n    <div class=\"item\" style=\"margin-left:auto; color:var(--muted)\">─ ─ ─ &nbsp;call path &nbsp; · &nbsp; ■ Spring @RestController &nbsp; · &nbsp; ◆ @Service<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ DIAGRAM ============ -->\n  <div class=\"diagram\">\n\n    <!-- Tier 1: Client + Agent + AI -->\n    <div class=\"tier-label\">\n      <div class=\"tier-label-inner\">\n        <span class=\"num\">01<\u002Fspan>\n        Client / Agent\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tier\">\n      <div class=\"tier-title\"><strong>Entry<\u002Fstrong> &nbsp;·&nbsp; Human input → AI agent → function-calling loop<\u002Fdiv>\n      <div class=\"agent-row\">\n\n        <div class=\"card agent\">\n          <span class=\"chip\">actor<\u002Fspan>\n          <h3><span class=\"dot\"><\u002Fspan>User / Shopper<\u002Fh3>\n          <p>Types natural-language intent.<br>\"Buy coffee and KitKat, ship to Bangalore.\"<\u002Fp>\n          <div class=\"tech-line\"><span>static/ chat UI<\u002Fspan><span>HTML·CSS·JS<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"arrow-col\"><div class=\"arrow\">→<\u002Fdiv><\u002Fdiv>\n\n        <div class=\"card ai\">\n          <span class=\"chip\">controller · @RestController<\u002Fspan>\n          <h3><span class=\"dot\"><\u002Fspan>ChatController<\u002Fh3>\n          <p>POST&nbsp;/api/chat · GET&nbsp;/status · POST&nbsp;/reset<br>Thin pass-through into GeminiChatService.<\u002Fp>\n          <div class=\"tech-line\"><span>Spring Web<\u002Fspan><span>WebFlux<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"arrow-col\"><div class=\"arrow\">→<\u002Fdiv><\u002Fdiv>\n\n        <div class=\"card ai\">\n          <span class=\"chip\">service · @Service<\u002Fspan>\n          <h3><span class=\"dot\"><\u002Fspan>GeminiChatService<\u002Fh3>\n          <p>Google Gemini with <b>9 function-calling tools<\u002Fb>.<br>Loops: tool call → UCP → response → LLM → reply.<\u002Fp>\n          <div class=\"tech-line\"><span>Gemini API<\u002Fspan><span>function calling<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"tier-label\">\n      <div class=\"tier-label-inner\">\n        <span class=\"num\">02<\u002Fspan>\n        UCP Facade\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tier\" style=\"background:linear-gradient(180deg, #fff 0%, #f7fbf8 100%)\">\n      <div class=\"tier-title\"><strong>Universal Commerce Protocol<\u002Fstrong> &nbsp;·&nbsp; One API surface any agent can speak — discovery, identity, checkout, orders<\u002Fdiv>\n\n      <div class=\"ucp-bar\">\n        <div class=\"ucp-cell\">\n          <h4 style=\"color:var(--ucp)\">◆ Discovery<\u002Fh4>\n          <span class=\"route\"><span class=\"method\">GET<\u002Fspan>/.well-known/ucp<\u002Fspan>\n          <div class=\"desc\">UcpDiscoveryController — advertises merchant, version, capabilities.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ucp-cell\">\n          <h4 style=\"color:var(--ucp)\">◆ Identity<\u002Fh4>\n          <span class=\"route\"><span class=\"method\">GET<\u002Fspan>/ucp/api/identity/authorize<\u002Fspan>\n          <span class=\"route\"><span class=\"method\">POST<\u002Fspan>/ucp/api/identity/token<\u002Fspan>\n          <span class=\"route\"><span class=\"method\">GET<\u002Fspan>/ucp/api/identity/userinfo<\u002Fspan>\n          <div class=\"desc\">OAuth-style linking so agent can shop on user's behalf.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ucp-cell\">\n          <h4 style=\"color:var(--ucp)\">◆ Checkout<\u002Fh4>\n          <span class=\"route\"><span class=\"method\">POST<\u002Fspan>/sessions<\u002Fspan>\n          <span class=\"route\"><span class=\"method\">GET<\u002Fspan>/sessions/{id}<\u002Fspan>\n          <span class=\"route\"><span class=\"method\">POST<\u002Fspan>/sessions/{id}/items<\u002Fspan>\n          <span class=\"route\"><span class=\"method\">GET<\u002Fspan>/products<\u002Fspan>\n          <span class=\"route\"><span class=\"method\">POST<\u002Fspan>/sessions/{id}/complete<\u002Fspan>\n          <div class=\"desc\">Cart → shipping → place order.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ucp-cell\">\n          <h4 style=\"color:var(--ucp)\">◆ Orders<\u002Fh4>\n          <span class=\"route\"><span class=\"method\">GET<\u002Fspan>/ucp/api/orders/{id}<\u002Fspan>\n          <div class=\"desc\">OrderController — status &amp; fulfillment lookup for the agent's post-purchase turn.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:16px\">\n        <div class=\"card ucp\"><span class=\"chip\">@Service<\u002Fspan><h3><span class=\"dot\"><\u002Fspan>—<\u002Fh3><p>Discovery is stateless; reads UcpProperties from application.yml.<\u002Fp><\u002Fdiv>\n        <div class=\"card ucp\"><span class=\"chip\">@Service<\u002Fspan><h3><span class=\"dot\"><\u002Fspan>IdentityService<\u002Fh3><p>Issues opaque tokens, resolves user → SAP customer.<\u002Fp><\u002Fdiv>\n        <div class=\"card ucp\"><span class=\"chip\">@Service<\u002Fspan><h3><span class=\"dot\"><\u002Fspan>CheckoutService<\u002Fh3><p>Session state machine. Delegates product lookup &amp; order placement to SAP layer.<\u002Fp><\u002Fdiv>\n        <div class=\"card ucp\"><span class=\"chip\">@Service<\u002Fspan><h3><span class=\"dot\"><\u002Fspan>OrderService<\u002Fh3><p>Reads fulfillment from SAP mock.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"tier-label\">\n      <div class=\"tier-label-inner\">\n        <span class=\"num\">03<\u002Fspan>\n        SAP Backend\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tier\">\n      <div class=\"tier-title\"><strong>SAP Commerce Cloud<\u002Fstrong> &nbsp;·&nbsp; OCC v2 — replaced with in-memory mock for the POC<\u002Fdiv>\n\n      <div class=\"row\">\n        <div class=\"card sap\">\n          <span class=\"chip\">mock · @Service<\u002Fspan>\n          <h3><span class=\"dot\"><\u002Fspan>SapOccMockService<\u002Fh3>\n          <p>Stands in for a live SAP OCC endpoint. Maps UCP calls to OCC-style product, cart and order operations.<\u002Fp>\n          <ul>\n            <li>product catalog lookup<\u002Fli>\n            <li>cart &amp; entry management<\u002Fli>\n            <li>order placement &amp; status<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div class=\"card sap\">\n          <span class=\"chip\">data · classpath<\u002Fspan>\n          <h3><span class=\"dot\"><\u002Fspan>mock-products.json<\u002Fh3>\n          <p><b>100 Nestle products<\u002Fb> across 13 categories — coffee, confectionery, dairy, water, nutrition, pet care, etc.<\u002Fp>\n          <div class=\"tech-line\"><span>src/main/resources<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"card sap\">\n          <span class=\"chip\">config · application.yml<\u002Fspan>\n          <h3><span class=\"dot\"><\u002Fspan>UcpProperties<\u002Fh3>\n          <p>merchant.id · merchant.name · occ-base-url · site-id<\u002Fp>\n          <div class=\"tech-line\"><span>nestle-store<\u002Fspan><span>occ/v2/nestle<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"card sap\" style=\"border-style:dashed; opacity:.85\">\n          <span class=\"chip\">not wired · future<\u002Fspan>\n          <h3 style=\"color:var(--muted)\"><span class=\"dot\" style=\"background:var(--muted)\"><\u002Fspan>Live SAP OCC v2<\u002Fh3>\n          <p>https://sap-commerce.example.com/occ/v2/nestle — swap the mock for a WebClient-backed adapter; UCP surface unchanged.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- ============ REQUEST FLOW ============ -->\n  <section class=\"flow\">\n    <div class=\"flow-head\">\n      <h2>End-to-end flow — <em style=\"font-family:'Instrument Serif',serif;color:var(--accent)\">one agent turn, six hops<\u002Fem><\u002Fh2>\n      <div class=\"sub\">user intent → placed order<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"steps\">\n      <div class=\"step\">\n        <span class=\"n\">01<\u002Fspan>\n        <h4>Discovery<\u002Fh4>\n        <p>Agent hits <b>/.well-known/ucp<\u002Fb> to learn the merchant's capabilities &amp; endpoints.<\u002Fp>\n        <div class=\"arr\">→<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <span class=\"n\">02<\u002Fspan>\n        <h4>Chat turn<\u002Fh4>\n        <p>User message posts to <b>/api/chat<\u002Fb>; Gemini picks a tool from the 9-tool catalog.<\u002Fp>\n        <div class=\"arr\">→<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <span class=\"n\">03<\u002Fspan>\n        <h4>Session<\u002Fh4>\n        <p>Gemini calls <b>POST /sessions<\u002Fb> → CheckoutService creates a cart via SAP mock.<\u002Fp>\n        <div class=\"arr\">→<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <span class=\"n\">04<\u002Fspan>\n        <h4>Search &amp; add<\u002Fh4>\n        <p><b>GET /products<\u002Fb> then <b>POST /sessions/{id}/items<\u002Fb> for each SKU matched.<\u002Fp>\n        <div class=\"arr\">→<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <span class=\"n\">05<\u002Fspan>\n        <h4>Complete<\u002Fh4>\n        <p>Shipping set, <b>POST /sessions/{id}/complete<\u002Fb> → SAP mock returns order id.<\u002Fp>\n        <div class=\"arr\">→<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <span class=\"n\">06<\u002Fspan>\n        <h4>Confirm<\u002Fh4>\n        <p>Gemini reads <b>GET /orders/{id}<\u002Fb>, paraphrases status back to the user.<\u002Fp>\n        <div class=\"arr\">→<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FOOTNOTES ============ -->\n  <div class=\"footnote\">\n    <div class=\"note\">\n      <b>Why a facade?<\u002Fb> The UCP layer is the invariant. Any commerce backend — SAP, Shopify, Magento — can sit behind it. Swap <b>SapOccMockService<\u002Fb> for a real OCC client without touching ChatController or Gemini's tool schema.\n    <\u002Fdiv>\n    <div class=\"note\">\n      <b>Agent contract.<\u002Fb> Gemini has <b>9 function-calling tools<\u002Fb> mapped 1-to-1 onto UCP endpoints. The LLM picks the tool; the JVM executes it; the result is fed back into the next model turn.\n    <\u002Fdiv>\n    <div class=\"note\">\n      <b>State.<\u002Fb> Checkout sessions live in-memory inside CheckoutService for the POC. Identity tokens are opaque, minted by IdentityService. No persistence layer is wired — suitable for demo, not production.\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
